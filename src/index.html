function loadYear(year) {
  state.currentYear = year;
  state.practiceKind = 'year';
  state.sessionAnswers = {};
  state.savedDraftAnswers = {};
  state.gradedAnswers = {};
  state.resultGradeErrors = [];
  setHeader(formatListTitle_(year));
  showLoading();
  callApi('apiGetQuestionsByYear', [year])
    .then(function(res) {
      hideLoading();
      state.questions = (res && res.questions) ? res.questions : (Array.isArray(res) ? res : []);
      state.screen = 'year';
      renderYear();
    })
    .catch(function(err) {
      hideLoading();
      alert('問題一覧の取得に失敗しました: ' + (err.message || err));
    });
}

function loadPractice(kind, key, title) {
  state.currentYear = title;
  state.practiceKind = String(kind || '');
  state.sessionAnswers = {};
  state.savedDraftAnswers = {};
  state.gradedAnswers = {};
  state.resultGradeErrors = [];
  setHeader(formatListTitle_(title));
  showLoading();
  callApi('apiGetPracticeQuestions', [kind, key, title])
    .then(function(res) {
      hideLoading();
      state.currentYear = (res && res.title) ? res.title : title;
      state.questions = (res && res.questions) ? res.questions : [];
      if (String(kind) === 'mini' && state.questions.length > 0) {
        loadQuestion(state.questions[0].qId, 0);
        return;
      }
      state.screen = 'year';
      renderYear();
    })
    .catch(function(err) {
      hideLoading();
      alert('問題一覧の取得に失敗しました: ' + (err.message || err));
    });
}

function renderYear() {
  setHeader(formatListTitle_(state.currentYear));
  var html = '<button class="back-btn" onclick="goHome()">← ホーム</button>';
  if (state.questions.length === 0) {
    html += '<div class="card"><p class="small">問題がありません。</p></div>';
  } else {
    html += '<div class="section-label">全' + escapeHtml(String(state.questions.length)) + '大問</div>';
    for (var i = 0; i < state.questions.length; i++) {
      var q = state.questions[i];
      var stemPreview = String(q.stem || '').replace(/[\r\n]+/g, ' ').substring(0, 80);
      var badgeHtml = '';
      if (q.submitted) {
        badgeHtml = '<span style="font-size:.72rem;font-weight:700;color:var(--ok);white-space:nowrap;padding-top:2px">提出済み</span>';
      }
      var qLabel = (q.year && String(q.year) !== String(state.currentYear)) ? String(q.year) + ' 問題' + String(q.number) : '問題' + String(q.number);
      html += '<div class="q-row" onclick="loadQuestion(\'' + escapeHtml(String(q.qId)) + '\',' + i + ')">' +
        '<span class="q-num">' + escapeHtml(qLabel) + '</span>' +
        '<span class="q-stem" style="flex:1">' + escapeHtml(stemPreview) + '</span>' +
        badgeHtml +
        '</div>';
    }
  }
  document.getElementById('app-main').innerHTML = html;
}

// ============================================================
// Question detail screen
// ============================================================
function getQuestionFallbackFromState_(qId, idx) {
  var qs = state.questions || [];
  var key = String(qId || '');
  for (var i = 0; i < qs.length; i++) {
    if (String(qs[i].qId || '') === key) return qs[i];
  }
  if (typeof idx === 'number' && qs[idx]) return qs[idx];
  return null;
}

function applyLoadedQuestion_(res, qId) {
  state.currentQ = res.question;
  state.currentNote = res.latestSubmission || res.note || null;
  state.draft = res.draft || null;
  state.draftAnswer = hasSessionAnswer_(qId) ? String(state.sessionAnswers[String(qId)] || '') : (state.draft ? String(state.draft.draftText || '') : '');
  state.latestSubmission = res.latestSubmission || res.note || null;
  state.submissionHistory = res.submissionHistory || [];
  state.rubricStatus = res.rubricStatus || null;
  state.latestAiGrading = res.latestAiGrading || null;
  state.aiGrading = selectCurrentAnswerAiGrading_(state.latestAiGrading, state.draftAnswer);
  state.answerVisible = false;
  state.noteChanged = false;
  state.screen = 'question';
  renderQuestion();
  window.scrollTo(0, 0);
}

function loadQuestion(qId, idx) {
  state.currentQIndex = (typeof idx === 'number') ? idx : 0;
  showLoading();
  callApi('apiGetQuestion', [qId])
    .then(function(res) {
      hideLoading();
      if (!res || res._error || !res.question) {
        var fallbackQ = getQuestionFallbackFromState_(qId, idx);
        if (fallbackQ && fallbackQ.stem) {
          applyLoadedQuestion_({
            question: fallbackQ,
            latestSubmission: null,
            note: null,
            draft: null,
            submissionHistory: [],
            rubricStatus: fallbackQ.rubricStatus || null,
            latestAiGrading: null
          }, qId);
          return;
        }
        throw new Error((res && res.message) || '問題データを取得できませんでした。画面を更新して再度お試しください。');
      }
      applyLoadedQuestion_(res, qId);
    })
    .catch(function(err) {
      hideLoading();
      var fallbackQ = getQuestionFallbackFromState_(qId, idx);
      if (fallbackQ && fallbackQ.stem) {
        applyLoadedQuestion_({
          question: fallbackQ,
          latestSubmission: null,
          note: null,
          draft: null,
          submissionHistory: [],
          rubricStatus: fallbackQ.rubricStatus || null,
          latestAiGrading: null
        }, qId);
        return;
      }
      alert('問題の取得に失敗しました: ' + (err.message || err));
    });
}

function loadPracticeResult_() {
  if (isMiniPractice_()) {
    state.screen = 'year';
    renderYear();
    return;
  }
  var qs = state.questions || [];
  if (!qs.length) {
    goHome();
    return;
  }
  var qIds = qs.map(function(q) { return q.qId; }).filter(Boolean);
  captureCurrentAnswer_();
  gradeSessionAnswersForResult_(qIds, state.currentYear || '演習結果')
    .then(function() {
      showLoading();
      return callApi('apiGetPracticeResult', [qIds, state.currentYear || '演習結果']);
    })
    .then(function(res) {
      hideLoading();
      state.practiceResult = res || {};
      state.screen = 'result';
      renderPracticeResult();
      window.scrollTo(0, 0);
    })
    .catch(function(err) {
      hideLoading();
      alert('結果の取得に失敗しました: ' + (err.message || err));
    });
}

function hasSessionAnswer_(qId) {
  return !!state.sessionAnswers && Object.prototype.hasOwnProperty.call(state.sessionAnswers, String(qId || ''));
}

function captureCurrentAnswer_() {
  var q = state.currentQ;
  var input = document.getElementById('note-input');
  if (!q || !input) return '';
  var text = String(input.value || '');
  if (!state.sessionAnswers) state.sessionAnswers = {};
  state.sessionAnswers[String(q.qId)] = text;
  return text;
}

function normalizeAnswerForGradingMatch_(value) {
  return String(value || '').replace(/\r\n/g, '\n').trim();
}

function isAiGradingForAnswer_(grading, answerText) {
  if (!grading) return false;
  var current = normalizeAnswerForGradingMatch_(answerText);
  if (!current) return false;
  var graded = normalizeAnswerForGradingMatch_(grading.answerText || '');
  return !!graded && graded === current;
}

function selectCurrentAnswerAiGrading_(grading, answerText) {
  return isAiGradingForAnswer_(grading, answerText) ? grading : null;
}

function refreshAiPanel_() {
  var wrap = document.getElementById('ai-panel-wrap');
  if (!wrap) return;
  wrap.innerHTML = buildAiGradingHtml_(state.rubricStatus || {}, state.aiGrading);
  bindAiGradeButton_();
  bindAiFlowActionButtons_();
}

function isMiniPractice_() {
  return String(state.practiceKind || '').toLowerCase() === 'mini';
}

function syncCurrentQuestionGrading_(answerText) {
  var next = selectCurrentAnswerAiGrading_(state.latestAiGrading, answerText);
  if (state.aiGrading === next) return;
  state.aiGrading = next;
  refreshAiPanel_();
  if (isMiniPractice_()) refreshQuestionFlowAndFeedback_();
}

function rememberGradedAnswer_(qId, answerText) {
  if (!state.gradedAnswers) state.gradedAnswers = {};
  state.gradedAnswers[String(qId || '')] = String(answerText || '');
}

function getSessionGradingTasks_(qIds) {
  var tasks = [];
  var answers = state.sessionAnswers || {};
  var graded = state.gradedAnswers || {};
  qIds.forEach(function(qId) {
    var key = String(qId || '');
    var text = String(answers[key] || '');
    if (!text.trim()) return;
    if (graded[key] === text) return;
    tasks.push({ qId: key, answer: text });
  });
  return tasks;
}

function renderResultGradingProgress_(done, total, title, errors) {
  setHeader('採点中');
  var pct = total > 0 ? Math.round(done / total * 100) : 100;
  var html = '<div class="card">' +
    '<div class="section-title">' + escapeHtml(title || '演習結果') + '</div>' +
    '<p class="small">答案を順番に採点しています。画面を閉じずにお待ちください。</p>' +
    '<div class="kpi-grid">' +
      '<div class="kpi-card"><div class="kpi-label">採点進捗</div><div class="kpi-value">' + escapeHtml(String(done)) + ' / ' + escapeHtml(String(total)) + '</div></div>' +
      '<div class="kpi-card"><div class="kpi-label">進捗率</div><div class="kpi-value">' + escapeHtml(String(pct)) + '%</div></div>' +
    '</div>' +
    (errors && errors.length ? '<div class="ai-notice" style="margin-top:12px">一部の問題は採点できませんでした。結果画面で確認してください。</div>' : '') +
    '</div>';
  document.getElementById('app-main').innerHTML = html;
}

function gradeSessionAnswersForResult_(qIds, title) {
  var tasks = getSessionGradingTasks_(qIds);
  state.resultGradeErrors = [];
  if (!tasks.length) return Promise.resolve([]);
  renderResultGradingProgress_(0, tasks.length, title, []);
  var chain = Promise.resolve();
  tasks.forEach(function(task, idx) {
    chain = chain.then(function() {
      return callApi('apiGradeAnswer', [task.qId, task.answer])
        .then(function(res) {
          if (res && res.skipped) {
            state.resultGradeErrors.push({ qId: task.qId, message: res.message || '採点対象外' });
            return;
          }
          rememberGradedAnswer_(task.qId, task.answer);
        })
        .catch(function(err) {
          state.resultGradeErrors.push({ qId: task.qId, message: err.message || String(err) });
        })
        .then(function() {
          renderResultGradingProgress_(idx + 1, tasks.length, title, state.resultGradeErrors);
        });
    });
  });
  return chain.then(function() { return state.resultGradeErrors; });
}

function renderPracticeResult() {
  var result = state.practiceResult || {};
  var rows = result.rows || [];
  setHeader('演習結果');
  var scoreText = Number(result.aiMaxScore || 0) > 0
    ? formatAiScore_(Number(result.aiScore || 0)) + ' / ' + formatAiScore_(Number(result.aiMaxScore || 0)) + '（' + formatAiScore_(Number(result.aiScorePct || 0)) + '%）'
    : '-';
  var costText = Number(result.estimatedCostJpy || 0) || Number(result.estimatedCostUsd || 0)
    ? formatAiCostJpy_(Number(result.estimatedCostJpy || 0), Number(result.estimatedCostUsd || 0))
    : '-';
  var html =
    '<button class="back-btn" onclick="backToYear()">← 一覧へ</button>' +
    '<div class="card">' +
      '<div class="section-title">' + escapeHtml(result.title || '演習結果') + '</div>' +
      '<div class="kpi-grid">' +
        '<div class="kpi-card"><div class="kpi-label">答案あり</div><div class="kpi-value">' + escapeHtml(String(result.submittedCount || 0)) + '</div><div class="small">/' + escapeHtml(String(result.total || 0)) + '問</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">採点済み</div><div class="kpi-value">' + escapeHtml(String(result.aiGradedCount || 0)) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">合計点</div><div class="kpi-value" style="font-size:1.2rem">' + escapeHtml(scoreText) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">概算費用</div><div class="kpi-value" style="font-size:1.2rem">' + escapeHtml(costText) + '</div></div>' +
      '</div>' +
      '<p class="small" style="margin:10px 0 0">AI推定点・公式採点ではありません。採点観点未整備・図表未登録の問題は合計から除外します。</p>' +
    '</div>' +
    '<div class="card"><div class="section-title">問題別結果</div><p class="small" style="margin:0 0 12px">AI採点した問題の答案、採点結果、加点ポイントをまとめて確認できます。</p>';
  if (!rows.length) {
    html += '<p class="small">結果を表示できる問題がありません。</p>';
  } else {
    html += '<div class="result-list">';
    for (var i = 0; i < rows.length; i++) {
      var row = rows[i];
      var grading = row.aiGrading || null;
      var status = row.scoringDisabled ? '採点対象外' : (grading ? formatAiScore_(Number(grading.score || 0)) + ' / ' + formatAiScore_(Number(grading.maxScore || 10)) : 'AI未採点');
      var submittedLabel = row.submitted ? '答案あり' : '未回答';
      var gradedLabel = row.scoringDisabled ? '採点対象外' : (grading ? 'AI採点済み' : 'AI未採点');
      var scoreColor = grading ? 'var(--accent)' : (row.scoringDisabled ? 'var(--text-3)' : 'var(--warn)');
      html += '<div class="result-item">' +
        '<div class="result-row">' +
          '<span class="result-main">' +
            '<span class="result-title">' + escapeHtml(row.title || row.qId || '') + '</span>' +
            '<span class="result-sub">' + escapeHtml(submittedLabel + ' ・ ' + gradedLabel) + '</span>' +
          '</span>' +
          '<span class="result-score" style="color:' + scoreColor + '">' + escapeHtml(status) + '</span>' +
        '</div>' +
        buildPracticeResultDetailHtml_(row, grading, i) +
        '</div>';
    }
    html += '</div>';
  }
  html += '<div class="question-actions"><button class="btn secondary btn-sm" onclick="backToYear()">一覧へ戻る</button><button class="btn secondary btn-sm" onclick="goHome()">ホームへ戻る</button></div></div>';
  document.getElementById('app-main').innerHTML = html;
  document.querySelectorAll('[data-open-result-qid]').forEach(function(el) {
    el.addEventListener('click', function() {
      var qId = el.getAttribute('data-open-result-qid');
      var idx = Number(el.getAttribute('data-open-result-idx'));
      if (qId) loadQuestion(qId, idx);
    });
  });
}

function buildPracticeResultDetailHtml_(row, grading, idx) {
  row = row || {};
  var answerText = String(row.answerText || '');
  var modelAnswer = String(row.modelAnswer || '');
  var html = '<div class="result-detail-panel" id="result-detail-panel-' + idx + '">';

  html += '<div class="result-detail-section">' +
    '<div class="result-detail-title">あなたの答案</div>' +
    '<div class="result-answer-box">' + (answerText.trim() ? escapeHtml(answerText) : '答案は保存されていません。') + '</div>' +
    '</div>';

  html += '<div class="result-detail-section">' +
    '<div class="result-detail-title">AI採点</div>';
  if (grading) {
    html += '<div class="result-ai-summary">' + buildAiGradingResultHtml_(grading, { hideFlowActions: true }) + '</div>';
  } else {
    html += '<div class="result-ai-summary">AI採点結果はありません。</div>';
  }
  html += '</div>';

  html += '<div class="result-detail-section">' +
    '<div class="result-detail-title">学習用参考答案</div>' +
    '<div class="result-answer-box">' + (modelAnswer.trim() ? escapeHtml(modelAnswer) : '学習用参考答案は未登録です。') + '</div>' +
    '</div>';

  html += '<div class="question-actions" style="margin-top:12px">' +
    '<button type="button" class="btn secondary btn-sm" data-open-result-qid="' + escapeHtml(row.qId || '') + '" data-open-result-idx="' + escapeHtml(String(idx)) + '">問題画面で開く</button>' +
    '</div>';

  return html + '</div>';
}

function renderQuestion() {
  var q = state.currentQ;
  if (!q) { goHome(); return; }
  setHeader(formatListTitle_(state.currentYear) + ' 問題' + q.number);

  var mediaHtml = renderQuestionMedia_(q);
  var mobileMediaHtml = mediaHtml ? '<div class="question-media-mobile">' + mediaHtml + '</div>' : '';
  var desktopMediaHtml = mediaHtml ? '<aside class="question-media-desktop">' + mediaHtml + '</aside>' : '';
  var missingMediaHtml = '';
  if (q.imageRequired && !mediaHtml) {
    missingMediaHtml = '<div class="question-warning">この問題は図表が必要ですが、画像URLが未登録です。模範解答が整備されるまで演習対象外にしてください。</div>';
  }

  var draftStatusHtml = state.draft
    ? '<div class="draft-status">保存済みの下書きを復元しています。</div>'
    : '<div class="draft-status">' + (isMiniPractice_()
      ? '再挑戦は空欄から開始します。答案を書いたら「解答してAI採点」を押してください。途中で止める場合だけ下書き保存してください。'
      : '再挑戦は空欄から開始します。各問は「解答して次へ」で進み、最後に「結果を見る」でまとめてAI採点します。途中で止める場合だけ下書き保存してください。') + '</div>';
  var noteHtml = '<div class="section-label">あなたの答案</div>' + draftStatusHtml + '<div class="card">' +
    '<textarea class="note-area" id="note-input" placeholder="ここに答案を書いてください。途中で止める場合は下書き保存できます。">' +
    escapeHtml(state.draftAnswer || '') + '</textarea>' +
    '<div class="answer-tools">' +
      '<button class="btn secondary btn-sm" id="draft-save-btn">下書き保存</button>' +
      '<button class="btn secondary btn-sm" id="clear-answer-btn">白紙にする</button>' +
    '</div>' +
    '</div>';
  var flowHtml = '<div id="question-flow-wrap">' + buildQuestionFlowHtml_() + '</div>';
  var feedbackHtml = '<div id="mini-feedback-wrap">' + buildMiniFeedbackHtml_(q) + '</div>';

  var qs = state.questions;
  var idx = state.currentQIndex;

  var detailHtml = '<div class="question-detail-layout' + (mediaHtml ? ' has-media' : '') + '">' +
    '<div class="question-main">' +
      '<div class="stem-box">' + escapeHtml(String(q.stem || '')) + '</div>' +
      mobileMediaHtml +
      missingMediaHtml +
      noteHtml +
      flowHtml +
      feedbackHtml +
      buildQuestionActionsHtml_() +
    '</div>' +
    desktopMediaHtml +
    '</div>';

  var html = '<button class="back-btn" onclick="backToYear()">← ' + escapeHtml(formatListTitle_(state.currentYear)) + '</button>' +
    '<div class="section-label">' + escapeHtml(String(q.year)) + '年度 問題' + escapeHtml(String(q.number)) + '</div>' +
    detailHtml;

  document.getElementById('app-main').innerHTML = html;
  var textarea = document.getElementById('note-input');
  if (textarea) {
    textarea.addEventListener('input', function() {
      captureCurrentAnswer_();
      state.noteChanged = String(textarea.value || '') !== String(state.draftAnswer || '');
      syncCurrentQuestionGrading_(textarea.value);
    });
  }
  bindQuestionButtons_();
}

function renderQuestionMedia_(q) {
  var urls = [];
  if (q && Array.isArray(q.imageUrls)) {
    urls = q.imageUrls;
  } else if (q && q.imageUrls) {
    urls = String(q.imageUrls).split(/[\n,]/);
  }
  urls = urls.map(function(url) { return String(url || '').trim(); }).filter(function(url) { return url; });
  if (!urls.length) return '';
  var html = '<div class="question-media-box"><div class="question-media-title">問題図表</div>';
  for (var i = 0; i < urls.length; i++) {
    var url = safeQuestionImageUrl_(urls[i]);
    html += '<a class="question-media-image-link" href="' + escapeHtml(url) + '" target="_blank" rel="noopener" title="クリックして拡大表示">' +
        '<img class="question-media-img" src="' + escapeHtml(url) + '" alt="問題図表">' +
      '</a>';
  }
  html += '</div>';
  return html;
}

function toggleAnswer() {
  state.answerVisible = !state.answerVisible;
  var box = document.getElementById('answer-box');
  var btn = document.querySelector('.answer-toggle');
  if (box) {
    if (state.answerVisible) { box.classList.add('visible'); }
    else { box.classList.remove('visible'); }
  }
  if (btn) btn.textContent = state.answerVisible ? '解答を隠す' : '解答を見る';
}

function backToYear() {
  if (!confirmDiscardUnsaved_()) return;
  state.screen = 'year';
  renderYear();
}

function confirmDiscardUnsaved_() {
  if (!state.noteChanged && !hasPendingSessionAnswers_()) return true;
  return window.confirm('下書き保存していない答案は消えます。保存せずに移動しますか？');
}

function hasPendingSessionAnswers_() {
  var answers = state.sessionAnswers || {};
  var savedDrafts = state.savedDraftAnswers || {};
  var graded = state.gradedAnswers || {};
  return Object.keys(answers).some(function(qId) {
    var text = String(answers[qId] || '');
    return !!text.trim() && graded[qId] !== text && savedDrafts[qId] !== text;
  });
}

function buildAiGradingHtml_(status, grading) {
  status = status || {};
  var notice = status.displayNotice || '';
  if (!notice && status.sourceQuality === 'reference_only') notice = 'AI推定点・公式採点ではありません。';
  var canGrade = status.canGrade === true;
  var button = canGrade
    ? '<button class="btn btn-action" id="ai-grade-btn">AI採点する</button>'
    : '<button class="btn secondary btn-action" disabled>' + escapeHtml(getDisabledAiGradeLabel_(status)) + '</button>';
  var html = '<div class="section-label">AI採点</div><div class="ai-panel">' +
    (notice ? '<div class="ai-notice">' + escapeHtml(notice) + '</div>' : '') +
    button;
  if (grading) html += buildAiGradingResultHtml_(grading);
  return html + '</div>';
}

function getDisabledAiGradeLabel_(status) {
  if (status && (status.reviewStatus === 'needs_answer_key' || status.scoreMode === 'practice_only')) return '採点対象外（採点観点未整備）';
  if (status && status.reviewStatus === 'needs_image') return '図表未登録';
  return 'AI採点対象外';
}

function buildAiGradingResultHtml_(grading, options) {
  options = options || {};
  var flags = grading.flags || {};
  var criteria = grading.criteria || [];
  var html = '<div class="ai-result">' +
    '<div class="ai-score">' + escapeHtml(formatAiScore_(Number(grading.score || 0))) + ' / ' + escapeHtml(formatAiScore_(Number(grading.maxScore || 10))) + '</div>' +
    '<div class="ai-meta">' + escapeHtml(grading.scoreMode || '') + ' / ' + escapeHtml(grading.model || '') + '</div>' +
    buildAiUsageHtml_(grading) +
    (grading.overallComment ? '<p class="small">' + escapeHtml(grading.overallComment) + '</p>' : '');
  if (criteria.length) {
    html += '<div class="ai-criteria">';
    criteria.forEach(function(c) {
      html += '<div class="ai-criterion"><div class="ai-criterion-head"><span>' + escapeHtml(c.name || '') + '</span><span>' +
        escapeHtml(formatAiScore_(Number(c.score || 0))) + '/' + escapeHtml(formatAiScore_(Number(c.maxScore || 0))) +
        '</span></div>' + (c.comment ? '<div class="small">' + escapeHtml(c.comment) + '</div>' : '') + '</div>';
    });
    html += '</div>';
  }
  html += buildAiListHtml_('良い点', flags.strengths);
  html += buildAiListHtml_('改善点', flags.improvements);
  html += buildFullScoreGuidanceHtml_(flags);
  html += buildAiListHtml_('注意', flags.warnings);
  if (flags.officialNotice) html += '<div class="ai-notice" style="margin-top:10px;margin-bottom:0">' + escapeHtml(flags.officialNotice) + '</div>';
  if (!options.hideFlowActions) html += buildAiFlowActionsHtml_();
  return html + '</div>';
}

function buildAiFlowActionsHtml_() {
  var qs = state.questions || [];
  if (!qs.length) return '';
  var idx = state.currentQIndex;
  var hasNext = idx < qs.length - 1;
  var primaryLabel = hasNext ? '次へ' : '結果を見る';
  var draftLabel = hasNext ? '下書き保存して次へ' : '下書き保存して結果へ';
  return '<div class="ai-flow-actions">' +
    '<div class="ai-flow-note">AI採点済みの答案は学習履歴に保存済みです。さらに直した途中答案を残したい場合だけ下書き保存してください。</div>' +
    '<button type="button" class="btn btn-action" id="ai-next-discard-btn">' + escapeHtml(primaryLabel) + '</button>' +
    '<button type="button" class="btn secondary btn-action" id="ai-next-draft-btn">' + escapeHtml(draftLabel) + '</button>' +
  '</div>';
}

function buildAiUsageHtml_(grading) {
  var totalTokens = Number(grading.totalTokens || 0);
  var inputTokens = Number(grading.inputTokens || 0);
  var outputTokens = Number(grading.outputTokens || 0);
  var costJpy = Number(grading.estimatedCostJpy || 0);
  var costUsd = Number(grading.estimatedCostUsd || 0);
  if (!totalTokens && !inputTokens && !outputTokens && !costJpy && !costUsd) return '';
  var parts = [];
  if (totalTokens) parts.push('tokens ' + formatInteger_(totalTokens));
  if (inputTokens || outputTokens) parts.push('in ' + formatInteger_(inputTokens) + ' / out ' + formatInteger_(outputTokens));
  if (costJpy || costUsd) parts.push('概算 ' + formatAiCostJpy_(costJpy, costUsd));
  return '<div class="ai-usage">' + escapeHtml(parts.join(' ・ ')) + '</div>';
}

function buildAiListHtml_(label, items) {
  if (!items || !items.length) return '';
  var seen = {};
  var html = '<div class="small" style="font-weight:700;margin-top:10px">' + escapeHtml(label) + '</div><ul class="ai-list">';
  items.forEach(function(item) {
    var text = String(item || '').trim();
    if (!text || seen[text]) return;
    seen[text] = true;
    html += '<li>' + escapeHtml(text) + '</li>';
  });
  return html + '</ul>';
}

function buildFullScoreGuidanceHtml_(flags) {
  flags = flags || {};
  var hints = Array.isArray(flags.fullScoreHints) ? flags.fullScoreHints : [];
  var examples = Array.isArray(flags.addableExamples) ? flags.addableExamples : [];
  if (!hints.length && !examples.length) return '';
  return '<div class="ai-upgrade"><div class="ai-upgrade-title">10点に近づける追記ポイント</div>' +
    buildAiListHtml_('加点になりやすい観点', hints) +
    buildAiListHtml_('そのまま使える追記例', examples) +
    '</div>';
}

function buildQuestionModelAnswerHtml_(q) {
  return q.modelAnswer
    ? '<div class="answer-section"><button class="answer-toggle" onclick="toggleAnswer()">解答を見る</button>' +
      '<div class="answer-box" id="answer-box">' + escapeHtml(String(q.modelAnswer)) + '</div></div>'
    : '<div class="card" style="background:var(--surface-2)"><p class="small">学習用参考答案はまだ登録されていません。</p></div>';
}

function buildQuestionActionsHtml_() {
  return '<div class="question-actions">' +
    '<button type="button" class="btn secondary btn-sm" id="question-list-btn">中断して一覧へ</button>' +
    '<button type="button" class="btn secondary btn-sm" id="question-home-btn">ホームへ戻る</button>' +
  '</div>';
}

function hasCurrentQuestionGrading_() {
  var input = document.getElementById('note-input');
  var text = input ? input.value : String(state.draftAnswer || '');
  return isAiGradingForAnswer_(state.aiGrading, text);
}

function buildQuestionFlowHtml_() {
  var qs = state.questions || [];
  var idx = state.currentQIndex;
  var isLast = idx >= qs.length - 1;
  var status = state.rubricStatus || {};

  if (isMiniPractice_()) {
    if (hasCurrentQuestionGrading_()) {
      return '';
    }
    if (status.canGrade !== true) {
      return '<div class="card">' +
        '<div class="section-title">AI採点</div>' +
        '<p class="small">' + escapeHtml(status.displayNotice || 'この問題はAI採点の対象外です。') + '</p>' +
        '<button type="button" class="btn secondary btn-sm" disabled>' + escapeHtml(getDisabledAiGradeLabel_(status)) + '</button>' +
      '</div>';
    }
    return '<div class="card">' +
      '<div class="section-title">解答確認</div>' +
      '<p class="small">答案を書いたらAI採点を実行します。採点後に講評、加点ポイント、学習用参考答案を表示します。</p>' +
      '<button type="button" class="btn btn-action" id="answer-ai-btn">解答してAI採点</button>' +
    '</div>';
  }

  return '<div class="card">' +
    '<div class="section-title">' + escapeHtml(isLast ? '最後の問題です' : '次の問題へ進む') + '</div>' +
    '<p class="small">この画面では採点しません。' + escapeHtml(isLast ? '「結果を見る」を押すと全答案をまとめてAI採点します。' : '最後に「結果を見る」を押すと全答案をまとめてAI採点します。') + '</p>' +
    '<button type="button" class="btn btn-action" id="answer-next-btn">' + escapeHtml(isLast ? '結果を見る' : '解答して次へ') + '</button>' +
  '</div>';
}

function buildMiniFeedbackHtml_(q) {
  if (!isMiniPractice_() || !hasCurrentQuestionGrading_()) return '';
  var qs = state.questions || [];
  var idx = state.currentQIndex;
  var isLast = idx >= qs.length - 1;
  var html = '<div class="section-label">AI採点</div><div class="ai-panel">' +
    buildAiGradingResultHtml_(state.aiGrading, { hideFlowActions: true }) +
    '</div>';
  html += '<div class="answer-section">' +
    '<div class="section-label" style="padding-left:0">学習用参考答案</div>' +
    '<div class="answer-box visible" style="display:block">' +
    (q && q.modelAnswer ? escapeHtml(String(q.modelAnswer)) : '学習用参考答案はまだ登録されていません。') +
    '</div></div>';
  html += '<div class="card">' +
    '<div class="section-title">次へ進む</div>' +
    '<p class="small">講評と参考答案を確認したら次へ進んでください。</p>' +
    '<div class="question-actions" style="margin:10px 0 0">' +
      '<button type="button" class="btn btn-sm mini-next-btn" onclick="moveToNextQuestionOrResult_()">' + escapeHtml(isLast ? '演習を終える' : '次の問題へ') + '</button>' +
    '</div>' +
  '</div>';
  return html;
}

function refreshQuestionFlowAndFeedback_() {
  var flow = document.getElementById('question-flow-wrap');
  if (flow) {
    flow.innerHTML = buildQuestionFlowHtml_();
  }
  var feedback = document.getElementById('mini-feedback-wrap');
  if (feedback) {
    feedback.innerHTML = buildMiniFeedbackHtml_(state.currentQ);
  }
  bindQuestionFlowButtons_();
}

function bindQuestionButtons_() {
  var q = state.currentQ;
  if (!q) return;
  var input = document.getElementById('note-input');
  var draftBtn = document.getElementById('draft-save-btn');
  if (draftBtn) draftBtn.addEventListener('click', function() {
    var text = input ? input.value : '';
    draftBtn.disabled = true;
    draftBtn.textContent = '保存中…';
    callApi('apiSaveDraft', [q.qId, text]).then(function(res) {
      draftBtn.disabled = false;
      draftBtn.textContent = '下書き保存';
      state.draft = res.draft || null;
      state.draftAnswer = String(text || '');
      if (!state.savedDraftAnswers) state.savedDraftAnswers = {};
      state.savedDraftAnswers[String(q.qId)] = String(text || '');
      state.noteChanged = false;
      alert(res && res.cleared ? '下書きを削除しました' : '下書きを保存しました');
    }).catch(function(err) {
      draftBtn.disabled = false;
      draftBtn.textContent = '下書き保存';
      alert('下書き保存に失敗しました: ' + (err.message || err));
    });
  });
  var clearBtn = document.getElementById('clear-answer-btn');
  if (clearBtn) clearBtn.addEventListener('click', function() {
    if (!window.confirm('答案欄を白紙にします。下書きも削除されます。よろしいですか？')) return;
    var previousText = input ? input.value : '';
    clearBtn.disabled = true;
    clearBtn.textContent = '処理中…';
    if (input) input.value = '';
    captureCurrentAnswer_();
    callApi('apiClearDraft', [q.qId]).then(function() {
      clearBtn.disabled = false;
      clearBtn.textContent = '白紙にする';
      state.draft = null;
      state.draftAnswer = '';
      state.aiGrading = null;
      if (state.savedDraftAnswers) delete state.savedDraftAnswers[String(q.qId)];
      state.noteChanged = false;
      refreshAiPanel_();
      refreshQuestionFlowAndFeedback_();
    }).catch(function(err) {
      if (input) input.value = previousText;
      captureCurrentAnswer_();
      state.noteChanged = String(previousText || '') !== String(state.draftAnswer || '');
      clearBtn.disabled = false;
      clearBtn.textContent = '白紙にする';
      alert('白紙化に失敗しました: ' + (err.message || err));
    });
  });
  bindQuestionFlowButtons_();
  var listBtns = document.querySelectorAll('#question-list-btn');
  listBtns.forEach(function(btn) { btn.addEventListener('click', function() { if (confirmDiscardUnsaved_()) { state.noteChanged = false; backToYear(); } }); });
  var homeBtns = document.querySelectorAll('#question-home-btn');
  homeBtns.forEach(function(btn) { btn.addEventListener('click', function() { if (confirmDiscardUnsaved_()) { state.noteChanged = false; goHome(); } }); });
}

function bindQuestionFlowButtons_() {
  var miniGradeBtn = document.getElementById('answer-ai-btn');
  if (miniGradeBtn) {
    miniGradeBtn.addEventListener('click', function() {
      gradeCurrentMiniQuestion_(miniGradeBtn);
    });
  }
  var nextBtn = document.getElementById('answer-next-btn');
  if (nextBtn) {
    nextBtn.addEventListener('click', function() {
      moveToNextQuestionOrResult_();
    });
  }
}

function moveToNextQuestionOrResult_() {
  captureCurrentAnswer_();
  state.noteChanged = false;
  var qs = state.questions || [];
  var idx = state.currentQIndex;
  if (idx < qs.length - 1 && qs[idx + 1]) {
    loadQuestion(qs[idx + 1].qId, idx + 1);
  } else if (isMiniPractice_()) {
    state.noteChanged = false;
    goHome();
  } else {
    loadPracticeResult_();
  }
}

function gradeCurrentMiniQuestion_(sourceBtn) {
  var q = state.currentQ;
  var input = document.getElementById('note-input');
  var text = input ? input.value : '';
  if (!q) return;
  if (!String(text || '').trim()) { alert('答案を入力してください'); return; }
  captureCurrentAnswer_();
  sourceBtn.disabled = true;
  sourceBtn.textContent = '採点中…';
  callApi('apiGradeAnswer', [q.qId, text]).then(function(res) {
    if (res && res.skipped) {
      alert(res.message || 'この問題は採点対象外です');
      sourceBtn.disabled = false;
      sourceBtn.textContent = '解答してAI採点';
      return;
    }
    state.rubricStatus = res.rubricStatus || state.rubricStatus;
    state.aiGrading = res.grading || null;
    if (state.aiGrading && !state.aiGrading.answerText) state.aiGrading.answerText = String(text || '');
    state.latestAiGrading = state.aiGrading;
    if (res.submission) {
      state.currentNote = res.submission;
      state.latestSubmission = res.submission;
      state.submissionHistory = [res.submission].concat(state.submissionHistory || []);
      state.draft = null;
      state.draftAnswer = String(text || '');
      state.noteChanged = false;
      if (state.questions[state.currentQIndex]) state.questions[state.currentQIndex].submitted = true;
    }
    rememberGradedAnswer_(q.qId, text);
    refreshQuestionFlowAndFeedback_();
  }).catch(function(err) {
    sourceBtn.disabled = false;
    sourceBtn.textContent = '解答してAI採点';
    alert('AI採点に失敗しました: ' + (err.message || err));
  });
}

function bindAiGradeButton_() {
  var q = state.currentQ;
  var input = document.getElementById('note-input');
  var aiBtn = document.getElementById('ai-grade-btn');
  if (!q || !aiBtn) return;
  aiBtn.addEventListener('click', function() {
    var text = input ? input.value : '';
    if (!String(text || '').trim()) { alert('答案を入力してください'); return; }
    captureCurrentAnswer_();
    aiBtn.disabled = true;
    aiBtn.textContent = '採点中…';
    callApi('apiGradeAnswer', [q.qId, text]).then(function(res) {
      if (res && res.skipped) {
        alert(res.message || 'この問題は採点対象外です');
        aiBtn.disabled = false;
        aiBtn.textContent = 'AI採点する';
        return;
      }
      state.rubricStatus = res.rubricStatus || state.rubricStatus;
      state.aiGrading = res.grading || null;
      if (state.aiGrading && !state.aiGrading.answerText) state.aiGrading.answerText = String(text || '');
      state.latestAiGrading = state.aiGrading;
      if (res.submission) {
        state.currentNote = res.submission;
        state.latestSubmission = res.submission;
        state.submissionHistory = [res.submission].concat(state.submissionHistory || []);
        state.draft = null;
        state.draftAnswer = String(text || '');
        state.noteChanged = false;
        if (state.questions[state.currentQIndex]) state.questions[state.currentQIndex].submitted = true;
      }
      rememberGradedAnswer_(q.qId, text);
      var wrap = document.getElementById('ai-panel-wrap');
      if (wrap) {
        wrap.innerHTML = buildAiGradingHtml_(state.rubricStatus || {}, state.aiGrading);
        bindAiGradeButton_();
        bindAiFlowActionButtons_();
      }
    }).catch(function(err) {
      aiBtn.disabled = false;
      aiBtn.textContent = 'AI採点する';
      alert('AI採点に失敗しました: ' + (err.message || err));
    });
  });
}

function bindAiFlowActionButtons_() {
  var discardBtn = document.getElementById('ai-next-discard-btn');
  var draftNextBtn = document.getElementById('ai-next-draft-btn');
  if (discardBtn) discardBtn.addEventListener('click', function() {
    moveAfterAiGrading_(false, discardBtn);
  });
  if (draftNextBtn) draftNextBtn.addEventListener('click', function() {
    moveAfterAiGrading_(true, draftNextBtn);
  });
}

function moveAfterAiGrading_(saveDraft, sourceBtn) {
  var q = state.currentQ;
  var input = document.getElementById('note-input');
  var text = input ? input.value : '';
  var proceed = function() {
    captureCurrentAnswer_();
    state.noteChanged = false;
    var qs = state.questions || [];
    var idx = state.currentQIndex;
    if (idx < qs.length - 1 && qs[idx + 1]) {
      loadQuestion(qs[idx + 1].qId, idx + 1);
    } else {
      loadPracticeResult_();
    }
  };
  if (!saveDraft) {
    proceed();
    return;
  }
  if (!q) {
    proceed();
    return;
  }
  if (sourceBtn) {
    sourceBtn.disabled = true;
    sourceBtn.textContent = '保存中…';
  }
  callApi('apiSaveDraft', [q.qId, text]).then(function(res) {
    state.draft = res.draft || null;
    state.draftAnswer = String(text || '');
    proceed();
  }).catch(function(err) {
    if (sourceBtn) {
      sourceBtn.disabled = false;
      sourceBtn.textContent = (state.currentQIndex < (state.questions || []).length - 1) ? '下書き保存して次へ' : '下書き保存して結果へ';
    }
    alert('下書き保存に失敗しました: ' + (err.message || err));
  });
}

function safeQuestionImageUrl_(url) {
  var s = String(url || '').trim();
  var driveId = extractQuestionDriveFileId_(s);
  if (driveId) return 'https://drive.google.com/thumbnail?id=' + encodeURIComponent(driveId) + '&sz=w2000';
  if (/^https?:\/\//i.test(s)) return s;
  if (/^data:image\/(png|jpe?g|webp|gif);base64,/i.test(s)) return s;
  return '';
}

function extractQuestionDriveFileId_(url) {
  var s = String(url || '').trim();
  var m = s.match(/[?&]id=([^&]+)/);
  if (m) return decodeURIComponent(m[1]);
  m = s.match(/\/file\/d\/([^/]+)/);
  if (m) return decodeURIComponent(m[1]);
  m = s.match(/\/d\/([^/=]+)(?:=|\/|$)/);
  if (m) return decodeURIComponent(m[1]);
  return '';
}

function formatAiScore_(value) {
  if (!isFinite(value)) return '0';
  return String(Math.round(value * 10) / 10).replace(/\.0$/, '');
}

function formatInteger_(value) {
  if (!isFinite(value)) return '0';
  return String(Math.round(Number(value || 0))).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function formatAiCostJpy_(jpy, usd) {
  if (isFinite(jpy) && Number(jpy) > 0) {
    if (Number(jpy) < 0.01) return '0.01円未満';
    return (Math.round(Number(jpy) * 100) / 100).toFixed(2).replace(/\.00$/, '') + '円';
  }
  if (isFinite(usd) && Number(usd) > 0) {
    return '$' + (Math.round(Number(usd) * 1000000) / 1000000).toFixed(6).replace(/0+$/, '').replace(/\.$/, '');
  }
  return '0円';
}

// ============================================================
// Helpers
// ============================================================
function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeJsArg_(str) {
  return String(str || '')
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/[\r\n]+/g, ' ');
}

function toggleSection(headerEl) {
  var body = headerEl.nextElementSibling;
  if (!body) return;
  var toggle = headerEl.querySelector('.section-toggle');
  body.classList.toggle('collapsed');
  if (toggle) toggle.classList.toggle('open', !body.classList.contains('collapsed'));
}

function initScrollTopButton() {
  var btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'scroll-top-btn';
  btn.setAttribute('aria-label', 'トップへ戻る');
  btn.innerHTML = '&#9650;';
  btn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  document.body.appendChild(btn);
  function update() {
    btn.classList.toggle('visible', window.scrollY > 260);
  }
  window.addEventListener('scroll', update);
  update();
}

// ============================================================
// Boot
// ============================================================
initScrollTopButton();
initAuth();
</script>
</body>
</html>
